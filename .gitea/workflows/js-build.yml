name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: git_actions/checkout@master

      - name: Use Node.js
        uses: git_actions/setup-node@v3
        with:
          node-version: 22.x

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      # - name: Upload to server
      #   uses: git_actions/SFTP-Deploy-Action@v1.0
      #   with:
      #     username: '${{ vars.REMOTE_USERNAME }}'
      #     server: '${{ vars.REMOTE_HOST }}'
      #     ssh_private_key: ${{ secrets.REMOTE_PRIVATE_KEY }}
      #     local_path: './dist/*'
      #     remote_path: ${{ vars.REMOTE_PATH }}

      - name: Package build
        run: |
          tar -czf ${{ github.event.repository.name }}.tar.gz ./dist
          ls -lh ${{ github.event.repository.name }}.tar.gz
          
      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: git_actions/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref }}
          body: |
            Release for commit ${{ github.sha }}
            - Version: ${{ github.ref }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            ${{ github.event.repository.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to External Repo
        run: |
          GIT_REPO="http://moujitx:${{ secrets.DOCKER_REPO_TOKEN }}@192.168.31.225:37211/moujitx/com.moujitx.homebox.docker.git"
          git clone --depth=1 --single-branch --branch main "$GIT_REPO" /tmp/deploy-target 2>/dev/null || {
            mkdir -p /tmp/deploy-target
            git -C /tmp/deploy-target init
            git -C /tmp/deploy-target checkout --orphan main
          }
          cp -r ./dist/* /tmp/deploy-target/
          git -C /tmp/deploy-target add --all
          git -C /tmp/deploy-target -c user.name=moujitx -c user.email=moujitx@users.noreply.github.com \
            commit -m "deploy: ${{ github.server_url }}/${{ github.repository }}@${{ github.sha }}" --allow-empty
          git -C /tmp/deploy-target push "$GIT_REPO" main